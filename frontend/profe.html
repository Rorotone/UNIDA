<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UnidaApp</title>
    <link rel="stylesheet" href="/styles/styles.css">
    <link rel="stylesheet" href="/styles/profe.css">
</head>
<body>
    <header>
        <h1>UnidaApp</h1>
        <div id="nav-placeholder"></div>
      </header>
    <main>
    <!-- Modal -->
    <div id="modal-profesor" class="modal">
        <div class="modal-content">
            <span class="close" id="close-modal">&times;</span>
            <!-- Formulario para crear o actualizar un profesor -->
            <form id="profesor-form">
                <h2 id="form-title">Agregar Profesor</h2>
                <input type="hidden" id="id_profesor">

                <label for="nombre">Nombre:</label>
                <input type="text" id="nombre" required>

                <label for="departamento">Departamento:</label>
                <input type="text" id="departamento" required>

                <label for="sede">Sede:</label>
                <input type="text" id="sede" required>

                <label for="sede_actual">Sede Actual:</label>
                <input type="text" id="sede_actual" required>

                <label for="talleres">Talleres:</label>
                <input type="text" id="talleres">

                <label for="formacion">Formación:</label>
                <input type="checkbox" id="formacion"> <span>Completada</span>

                <label for="estado_I">Estado:</label>
                <input type="checkbox" id="estado_I"> <span>Activo</span>

                <label for="magister">¿Magíster?</label>
                <input type="checkbox" id="magister"> <span>Sí</span>

                <label for="otro_i">Información Adicional:</label>
                <input type="text" id="otro_i">

                <button type="submit">Guardar</button>
            </form>
        </div>
    </div>

    <h2>Lista de Profesores</h2>
    <button id="open-modal-btn" type="button">Agregar Profesor</button>
    <div class="search-container">
        <label for="search-nombre">Buscar por nombre:</label>
        <input type="text" id="search-nombre" placeholder="Buscar por nombre">

        <label for="search-departamento">Departamento:</label>
        <select id="search-departamento"></select>

        <label for="search-sede">Sede:</label>
        <select id="search-sede"></select>

        <label for="search-sede-clases">Sede de clases:</label>
        <select id="search-sede-clases"></select>

        <label for="search-talleres-vra">Talleres VRA:</label>
        <select id="search-talleres-vra"></select>

        <button id="search-btn">Buscar</button>
    </div>
    <table id="profesores-table">
        <thead>
            <tr>
                <th>Nombre</th>
                <th>Departamento</th>
                <th>Sede</th>
                <th>Sede de clases</th>
                <th>Talleres VRA</th>
                <th>Formación VRA</th>
                <th>Investigación</th>
                <th>Magíster en Docencia</th>
                <th>Otra información</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody id="profesores-body">
            <!-- Los datos de los profesores se insertarán aquí dinámicamente -->
        </tbody>
    </table>
</main>

<script src="/scripts/loadProf.js"></script>
<script src="/scripts/nav.js"></script>
<script src="/scripts/profe.js"></script>
</body>
</html>
