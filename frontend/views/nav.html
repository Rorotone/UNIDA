<!-- Burbuja de usuario -->
<div id="user-bubble-wrapper">
  <button id="user-bubble-btn" aria-label="Menú de usuario">?</button>

  <div id="user-dropdown">
    <div class="dd-header">
      <div id="dd-avatar">?</div>
      <div id="dd-nombre">—</div>
      <div id="dd-username">—</div>
      <span id="dd-rol-badge"></span>
    </div>
    <div class="dd-actions">
      <button id="dd-cambiar-password" class="dd-btn">🔒 Cambiar contraseña</button>
      <button id="dd-gestion-usuarios" class="dd-btn" style="display:none;">👥 Gestión de usuarios</button>
      <hr class="dd-divider">
      <button id="dd-logout" class="dd-btn danger">🚪 Cerrar sesión</button>
    </div>
  </div>
</div>

<!-- Modal cambiar contraseña -->
<div id="modal-change-password" class="nav-modal">
  <div class="nav-modal-content">
    <h3 class="nav-modal-title">🔒 Cambiar contraseña</h3>
    <div id="modal-pwd-alert" class="nav-modal-alert"></div>
    <div class="nav-modal-field">
      <label>Contraseña actual</label>
      <input type="password" id="modal-current-password">
    </div>
    <div class="nav-modal-field">
      <label>Nueva contraseña</label>
      <input type="password" id="modal-new-password">
    </div>
    <div class="nav-modal-field">
      <label>Confirmar nueva contraseña</label>
      <input type="password" id="modal-confirm-password">
    </div>
    <div class="nav-modal-actions">
      <button id="modal-pwd-cancel" class="btn-cancel">Cancelar</button>
      <button id="modal-pwd-submit" class="btn-primary">Guardar</button>
    </div>
  </div>
</div>

<!-- Modal gestión de usuarios -->
<div id="modal-gestion-usuarios" class="nav-modal">
  <div class="nav-modal-content nav-modal-wide">
    <button type="button" class="nav-modal-close" id="modal-gestion-close" aria-label="Cerrar">&times;</button>
    <h3 class="nav-modal-title">👥 Gestión de usuarios</h3>
    <p class="nav-modal-subtitle">Organizador de usuarios del sistema</p>

    <div class="nav-modal-tabs">
      <button type="button" class="nav-modal-tab is-active" data-tab="usuarios-registrados">Usuarios registrados</button>
      <button type="button" class="nav-modal-tab" data-tab="registrar-usuarios">Registrar usuarios</button>
    </div>

    <!-- Tab: Usuarios registrados -->
    <section class="nav-modal-panel is-active" data-panel="usuarios-registrados">
      <div id="modal-gestion-alert" class="nav-modal-alert"></div>
      <div class="gestion-table-wrap">
        <table class="gestion-users-table">
          <thead>
            <tr>
              <th>Nombre</th>
              <th>Username</th>
              <th>Rol</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody id="gestion-users-body"></tbody>
        </table>
      </div>
    </section>

    <!-- Tab: Registrar usuarios -->
    <section class="nav-modal-panel" data-panel="registrar-usuarios">
      <div id="modal-user-alert" class="nav-modal-alert"></div>
      <div class="nav-modal-field">
        <label>Nombre completo</label>
        <input type="text" id="modal-user-nombre">
      </div>
      <div class="nav-modal-field">
        <label>Usuario</label>
        <input type="text" id="modal-user-username">
      </div>
      <div class="nav-modal-field">
        <label>Contraseña</label>
        <input type="password" id="modal-user-password">
      </div>
      <div class="nav-modal-field">
        <label>Rol</label>
        <select id="modal-user-rol">
          <option value="">Seleccione un rol...</option>
        </select>
      </div>
      <div class="nav-modal-actions">
        <button id="modal-user-submit" class="btn-primary">Crear usuario</button>
      </div>
    </section>
  </div>
</div>
