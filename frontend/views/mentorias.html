<!DOCTYPE html>
<html lang="es">
<head>
  <script src="/scripts/core/nav.js"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mentorías - UNIDA</title>
  <link rel="stylesheet" href="/styles/styles.css">
  <link rel="stylesheet" href="/styles/mentoria.css">
</head>
<body>
  <header>
    <div class="header-shell">
      <div class="brand">
        <h1>UNIDA</h1>
      </div>
      <div id="nav-placeholder"></div>
    </div>
  </header>

  <main class="container">
    <section class="section">
      <div class="section-header">
        <div>
          <h1>Mentorías</h1>
          <p class="section-subtitle">Gestiona mentorías, tareas y seguimiento.</p>
        </div>
        <div class="form-actions">
          <button id="btn-abrir-modal-mentoria" type="button">Crear nueva mentoría</button>
        </div>
      </div>
    </section>

    <section class="section">
      <div id="calendario-semanal"></div>
       <div style="margin-top:8px;">
        <button id="btn-ver-todas" type="button" class="btn-secondary">Ver todas las mentorías</button>
      </div>
    </section>

    <section class="section">
      <div id="lista-mentorias"></div>
    </section>
  </main>

  <!-- Modal crear mentoría -->
  <div id="modal-mentoria" class="modal" aria-hidden="true">
    <div class="modal-content">
      <span id="cerrar-modal-mentoria" class="close" role="button" tabindex="0" aria-label="Cerrar modal">&times;</span>

      <form id="crear-mentoria-form">
        <h2>Crear Nueva Mentoría</h2>

        <div class="form-group">
          <label for="titulo-mentoria">Título de la mentoría</label>
          <input type="text" id="titulo-mentoria" required>
        </div>

        <div class="form-group">
          <label for="mentor-select">Seleccione un mentor</label>
          <select id="mentor-select" required>
            <option value="">Seleccione un mentor</option>
          </select>
        </div>

        <div class="form-group">
          <label for="profesor-select">Seleccione un profesor</label>
          <select id="profesor-select" required>
            <option value="">Seleccione un profesor</option>
          </select>
        </div>

        <div class="form-group">
          <label for="fecha-mentoria-inicio">Fecha de la mentoría inicio</label>
          <input type="date" id="fecha-mentoria-inicio" required
            onchange="document.getElementById('fecha-mentoria-termino').min = this.value;">
        </div>

        <div class="form-group">
          <label for="fecha-mentoria-termino">Fecha de la mentoría termino</label>
          <input type="date" id="fecha-mentoria-termino" required>
        </div>

        <div class="form-actions">
          <button type="submit">Crear Mentoría</button>
          <button type="button" id="btn-cancelar-modal-mentoria" class="btn-secondary">Cancelar</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Template de tarjeta -->
  <template id="mentoria-template">
    <div class="mentoria-card" data-mentoria-id="">

      <div class="mentoria-card-header">
        <h3 class="mentoria-titulo"></h3>
        <span class="mentoria-badge-estado">Activa</span>
      </div>

      <div class="mentoria-card-body">
        <div class="mentoria-meta">
          <div class="mentoria-meta-item">
            <span class="mentoria-meta-label">👤 Mentor</span>
            <span class="mentoria-meta-value mentor"></span>
          </div>
          <div class="mentoria-meta-item">
            <span class="mentoria-meta-label">🎓 Profesor</span>
            <span class="mentoria-meta-value profesor"></span>
          </div>
        </div>

        <div class="mentoria-periodo">
          📅 <span class="mentoria-fechas"></span>
        </div>

        <div class="mentoria-actions">
          <button class="btn-ver-tareas btn-secondary" type="button">📋 Ver Tareas</button>
          <button class="btn-completar" type="button">✓ Completar</button>
          <button class="btn-eliminar btn-danger" type="button">Eliminar</button>
        </div>
      </div>

      <div class="tareas-container hidden-block">
        <div class="tareas-header">
          <h4>📌 Tareas</h4>
          <div class="tareas-masivo-actions">
            <button class="btn-marcar-todas btn-secondary" type="button">✓ Marcar todas</button>
            <button class="btn-desmarcar-todas btn-secondary" type="button">✗ Desmarcar todas</button>
          </div>
        </div>

        <ul class="lista-tareas"></ul>

        <button class="btn-mostrar-form-tarea btn-secondary" type="button">
          + Agregar tarea
        </button>

        <form class="form-nueva-tarea hidden-block">
          <div class="form-group">
            <label>Título</label>
            <input type="text" name="titulo" required placeholder="Título de la tarea">
          </div>
          <div class="form-group">
            <label>Descripción</label>
            <textarea name="descripcion" required placeholder="Descripción de la tarea"></textarea>
          </div>
          <div class="form-group">
            <label>Fecha</label>
            <input type="date" name="fecha">
          </div>
          <div class="form-actions">
            <button type="submit">Guardar tarea</button>
          </div>
        </form>
      </div>

    </div>
  </template>

  <script src="/scripts/mentorias/mentorias.api.js"></script>
  <script src="/scripts/mentorias/mentorias.ui.js"></script>
  <script src="/scripts/mentorias/mentorias.js"></script>
</body>
</html>
