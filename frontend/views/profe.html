<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UNIDA - Profesores</title>
  <link rel="stylesheet" href="/styles/styles.css">
  <link rel="stylesheet" href="/styles/profe.css">
</head>
<body>
  <header>
    <div class="header-shell">
      <div class="brand"><h1>UNIDA</h1></div>
      <div id="nav-placeholder"></div>
    </div>
  </header>

  <main>
    <div id="modal-profesor" class="modal">
      <div class="modal-content">
        <span class="close" id="close-modal">&times;</span>
        <form id="profesor-form">
          <h2 id="form-title">Agregar Profesor</h2>
          <input type="hidden" id="id_profesor">

          <div class="form-group"><label for="nombre">Nombre</label><input type="text" id="nombre" required></div>
          <div class="form-group"><label for="departamento">Departamento</label><input type="text" id="departamento" required></div>
          <div class="form-group"><label for="sede">Sede</label><input type="text" id="sede" required></div>
          <div class="form-group"><label for="sede_actual">Sede Actual</label><input type="text" id="sede_actual" required></div>
          <div class="form-group"><label for="talleres">Talleres</label><input type="text" id="talleres"></div>
          <div class="form-group"><label for="formacion">Formación</label><input type="checkbox" id="formacion"></div>
          <div class="form-group"><label for="estado_I">Estado</label><input type="checkbox" id="estado_I"></div>
          <div class="form-group"><label for="magister">¿Magíster?</label><input type="checkbox" id="magister"></div>
          <div class="form-group"><label for="otro_i">Información adicional</label><input type="text" id="otro_i"></div>
          <button type="submit">Guardar</button>
        </form>
      </div>
    </div>

    <section class="section">
      <h2>Lista de Profesores</h2>
      <div class="form-actions" style="margin-bottom:16px;">
        <button id="open-modal-btn" type="button">Agregar Profesor</button>
        <button id="toggle-filtros-btn" type="button">Filtrar</button>
      </div>

      <div class="search-container hidden" id="search-container">
        <div><label for="search-nombre">Buscar por nombre</label><input type="text" id="search-nombre" placeholder="Buscar por nombre"></div>
        <div><label for="search-departamento">Departamento</label><select id="search-departamento"></select></div>
        <div><label for="search-sede">Sede</label><select id="search-sede"></select></div>
        <div><label for="search-sede-clases">Sede de clases</label><select id="search-sede-clases"></select></div>
        <div><label for="search-talleres-vra">Talleres VRA</label><select id="search-talleres-vra"></select></div>
        <div class="form-actions" style="align-items:end;">
          <button id="search-btn">Buscar</button> 
          <button id="reset-btn" type="button">Limpiar filtros</button>
        </div>
      </div>

      <div class="table-wrap">
        <table id="profesores-table">
          <thead>
            <tr>
              <th>Nombre</th>
              <th>Departamento</th>
              <th>Sede</th>
              <th>Sede de clases</th>
              <th>Talleres VRA</th>
              <th>Formación VRA</th>
              <th>Investigación</th>
              <th>Magíster en Docencia</th>
              <th>Otra información</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody id="profesores-body"></tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="/scripts/profesores/profesores.api.js"></script>
  <script src="/scripts/profesores/profesores.ui.js"></script>
  <script src="/scripts/profesores/profesores.js"></script>
  <script src="/scripts/core/nav.js"></script>
</body>
</html>
